<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Persona AI - GenAI JS 2026</title>
  <!-- <link rel="stylesheet" href="./dist/output.css"> -->
  <link rel="stylesheet" href="./src/styles.css">
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="h-full flex flex-col md:flex-row font-sans overflow-hidden">

  <aside class="w-full md:w-80 bg-slate-900 border-b md:border-b-0 md:border-r border-slate-800 flex flex-col justify-between z-10">
    <div>
      <div class="p-6 border-b border-slate-800">
        <h1 class="text-xl font-bold tracking-wider bg-linear-to-r from-amber-400 to-cyan-400 bg-clip-text text-transparent">
          <i class="fa-solid fa-wand-magic-sparkles mr-2"></i>Persona AI
        </h1>
        <p class="text-xs text-slate-400 mt-1">JS GenAI 2026</p>
      </div>
      
      <div class="p-4 space-y-3">
        <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider px-2">Choose Mentor</p>
        
        <button type="button" id="btn-hitesh" class="w-full flex items-center gap-4 p-3 rounded-xl transition-all duration-200 border border-transparent" onclick="setActivePersona('hitesh')">
          <div id="avatar-hitesh" class="w-11 h-11 rounded-full flex items-center justify-center font-bold text-sm bg-slate-800 text-slate-300">HC</div>
          <div class="text-left">
            <h3 id="name-hitesh" class="font-semibold text-sm">Hitesh Choudhary</h3>
            <p class="text-xs text-slate-400">Chai aur Code</p>
          </div>
        </button>

        <button type="button" id="btn-piyush" class="w-full flex items-center gap-4 p-3 rounded-xl transition-all duration-200 border border-transparent" onclick="setActivePersona('piyush')">
          <div id="avatar-piyush" class="w-11 h-11 rounded-full flex items-center justify-center font-bold text-sm bg-slate-800 text-slate-300">PG</div>
          <div class="text-left">
            <h3 id="name-piyush" class="font-semibold text-sm">Piyush Garg</h3>
            <p class="text-xs text-slate-400">System Design & Dev</p>
          </div>
        </button>
      </div>
    </div>
    
    <div class="p-4 border-t border-slate-800 text-center text-xs text-slate-500">
      Frontend Mode Enabled
    </div>
  </aside>

  <main class="flex-1 flex flex-col h-full bg-slate-950">
    <header class="h-16 border-b border-slate-800 flex items-center px-6 bg-slate-900/40 backdrop-blur">
      <div class="flex items-center gap-2">
        <span class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
        <h2 id="chat-header-title" class="text-sm font-medium text-slate-300">Loading Mentor...</h2>
      </div>
    </header>

    <div id="chat-stream" class="flex-1 overflow-y-auto p-6 space-y-6 scrollbar-style"></div>

    <footer class="p-4 border-t border-slate-800 bg-slate-900/20">
      <form id="chat-form" class="max-w-4xl mx-auto flex items-center gap-2 bg-slate-900 border border-slate-800 rounded-xl p-2 focus-within:border-slate-700 transition-all">
        <input type="text" id="chat-input" placeholder="Type an engineering question..." class="w-full flex-1 bg-transparent px-3 py-2 text-sm text-slate-200 focus:outline-none placeholder-slate-500" required autocomplete="off" />
        <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-semibold px-4 py-2 rounded-lg transition-all flex items-center gap-2 shrink-0">
          Send <i class="fa-solid fa-paper-plane"></i>
        </button>
      </form>
    </footer>
  </main>

  <script src="./src/app.js"></script>
</body>
</html>
